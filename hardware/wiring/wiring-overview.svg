<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
<style>.box{fill:#f6f6f6;stroke:#222;stroke-width:2}.txt{font-family:Arial,sans-serif;font-size:22px;fill:#111}.small{font-family:Arial,sans-serif;font-size:17px;fill:#111}.line{stroke:#222;stroke-width:3;fill:none}.red{fill:#ffdddd;stroke:#aa0000;stroke-width:2}.green{fill:#ddffdd;stroke:#008800;stroke-width:2}.blue{fill:#ddeeff;stroke:#0055aa;stroke-width:2}</style>
<rect class="box" x="430" y="90" width="330" height="430" rx="18"/><text class="txt" x="530" y="130">ESP32</text>
<text class="small" x="455" y="185">GPIO34 ADC  ◄── LED sensor</text><text class="small" x="455" y="235">GPIO18      ───► 2N7000 / buzzer</text><text class="small" x="455" y="285">GPIO19      ───► Red LED mirror</text><text class="small" x="455" y="335">GPIO21      ───► Green status LED</text><text class="small" x="455" y="385">GPIO22      ◄── Mute button</text>
<rect class="blue" x="70" y="115" width="260" height="110" rx="16"/><text class="txt" x="110" y="155">Sensor probe</text><text class="small" x="105" y="190">BPW40 in black tube</text><line class="line" x1="330" y1="170" x2="430" y2="170"/>
<rect class="red" x="850" y="255" width="250" height="95" rx="16"/><text class="txt" x="910" y="295">Red LED</text><text class="small" x="890" y="325">Mirrors boiler lamp</text><line class="line" x1="760" y1="285" x2="850" y2="300"/>
<rect class="green" x="850" y="365" width="250" height="95" rx="16"/><text class="txt" x="895" y="405">Green LED</text><text class="small" x="900" y="435">Status / power</text><line class="line" x1="760" y1="335" x2="850" y2="410"/>
<rect class="box" x="850" y="120" width="250" height="95" rx="16"/><text class="txt" x="905" y="160">Buzzer</text><text class="small" x="875" y="190">via 2N7000 MOSFET</text><line class="line" x1="760" y1="235" x2="850" y2="170"/>
<rect class="box" x="850" y="500" width="250" height="95" rx="16"/><text class="txt" x="900" y="540">Mute button</text><text class="small" x="880" y="570">GPIO22 to GND</text><line class="line" x1="760" y1="385" x2="850" y2="550"/>
<text class="txt" x="335" y="670">ESPHome Boiler Monitor wiring overview</text></svg>
