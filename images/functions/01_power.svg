<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100">
<style>
  .title { font: bold 54px Arial, sans-serif; fill: #111; }
  .subtitle { font: 28px Arial, sans-serif; fill: #444; }
  .label { font: bold 30px Arial, sans-serif; fill: #111; }
  .text { font: 26px Arial, sans-serif; fill: #111; }
  .small { font: 22px Arial, sans-serif; fill: #333; }
  .pin { font: bold 24px Arial, sans-serif; fill: #111; }
  .board { fill: #263238; stroke: #111; stroke-width: 4; }
  .component { fill: #fafafa; stroke: #222; stroke-width: 4; }
  .note { fill: #fff8dc; stroke: #c58b00; stroke-width: 3; }
  .wire-red { stroke: #d00000; stroke-width: 10; fill: none; stroke-linecap: round; }
  .wire-black { stroke: #111; stroke-width: 10; fill: none; stroke-linecap: round; }
  .wire-orange { stroke: #ef7d00; stroke-width: 10; fill: none; stroke-linecap: round; }
  .wire-purple { stroke: #6a1b9a; stroke-width: 10; fill: none; stroke-linecap: round; }
  .wire-yellow { stroke: #d9a300; stroke-width: 10; fill: none; stroke-linecap: round; }
  .wire-green { stroke: #008f3d; stroke-width: 10; fill: none; stroke-linecap: round; }
  .wire-blue { stroke: #0068c9; stroke-width: 10; fill: none; stroke-linecap: round; }
  .lead { stroke: #555; stroke-width: 7; fill: none; stroke-linecap: round; }
  .resistor { fill: #ead6a2; stroke: #5d4930; stroke-width: 4; }
  .ground { stroke: #111; stroke-width: 6; }
</style>
<rect width="100%" height="100%" fill="white"/>
<text x="60" y="80" class="title">1. Power Connections</text>
<text x="60" y="125" class="subtitle">Use these supply pins for the complete project.</text>

<rect x="80" y="300" width="330" height="260" rx="24" class="board"/>
<text x="145" y="365" style="font:bold 38px Arial; fill:white;">ESP32 D1 R32</text>
<circle cx="390" cy="420" r="12" fill="white"/>
<text x="120" y="438" style="font:bold 32px Arial; fill:white;">5V / 3V3 / GND</text>

<circle cx="390" cy="380" r="11" fill="#d00000"/>
<circle cx="390" cy="450" r="11" fill="#ef7d00"/>
<circle cx="390" cy="520" r="11" fill="#111"/>
<text x="145" y="392" style="font:bold 30px Arial; fill:white;">5V</text>
<text x="145" y="462" style="font:bold 30px Arial; fill:white;">3V3</text>
<text x="145" y="532" style="font:bold 30px Arial; fill:white;">GND</text>

<path d="M390 380 H930" class="wire-red"/>
<text x="560" y="350" class="label">+5V supply</text>
<rect x="930" y="320" width="480" height="120" rx="18" class="component"/>
<text x="970" y="390" class="text">Active buzzer positive terminal</text>

<path d="M390 450 H930" class="wire-orange"/>
<text x="560" y="430" class="label">+3.3V supply</text>
<rect x="930" y="455" width="480" height="150" rx="18" class="component"/>
<text x="970" y="510" class="text">Phototransistor bias resistor</text>
<text x="970" y="555" class="text">DS18B20 VDD and pull-up</text>

<path d="M390 520 H930" class="wire-black"/>
<text x="560" y="505" class="label">Common ground</text>

<line x1="1110" y1="620" x2="1110" y2="660" class="ground"/>
<line x1="1072" y1="660" x2="1148" y2="660" class="ground"/>
<line x1="1084" y1="675" x2="1136" y2="675" class="ground"/>
<line x1="1096" y1="690" x2="1124" y2="690" class="ground"/>
<text x="1070" y="730" class="label">GND</text>

<rect x="70" y="830" width="1460" height="170" rx="20" class="note"/>
<text x="110" y="890" class="label">Color rule</text>
<text x="110" y="940" class="text">Red = +5V, orange = +3.3V, black = GND.</text>
<text x="110" y="985" class="text">Never connect GPIO pins directly to +5V.</text>
</svg>