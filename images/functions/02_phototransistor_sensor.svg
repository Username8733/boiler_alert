<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100">
<style>
  .title { font: bold 54px Arial, sans-serif; fill: #111; }
  .subtitle { font: 28px Arial, sans-serif; fill: #444; }
  .label { font: bold 30px Arial, sans-serif; fill: #111; }
  .text { font: 26px Arial, sans-serif; fill: #111; }
  .small { font: 22px Arial, sans-serif; fill: #333; }
  .pin { font: bold 24px Arial, sans-serif; fill: #111; }
  .board { fill: #263238; stroke: #111; stroke-width: 4; }
  .component { fill: #fafafa; stroke: #222; stroke-width: 4; }
  .note { fill: #fff8dc; stroke: #c58b00; stroke-width: 3; }
  .wire-red { stroke: #d00000; stroke-width: 10; fill: none; stroke-linecap: round; }
  .wire-black { stroke: #111; stroke-width: 10; fill: none; stroke-linecap: round; }
  .wire-orange { stroke: #ef7d00; stroke-width: 10; fill: none; stroke-linecap: round; }
  .wire-purple { stroke: #6a1b9a; stroke-width: 10; fill: none; stroke-linecap: round; }
  .wire-yellow { stroke: #d9a300; stroke-width: 10; fill: none; stroke-linecap: round; }
  .wire-green { stroke: #008f3d; stroke-width: 10; fill: none; stroke-linecap: round; }
  .wire-blue { stroke: #0068c9; stroke-width: 10; fill: none; stroke-linecap: round; }
  .lead { stroke: #555; stroke-width: 7; fill: none; stroke-linecap: round; }
  .resistor { fill: #ead6a2; stroke: #5d4930; stroke-width: 4; }
  .ground { stroke: #111; stroke-width: 6; }
</style>
<rect width="100%" height="100%" fill="white"/>
<text x="60" y="80" class="title">2. Phototransistor Sensor</text>
<text x="60" y="125" class="subtitle">BPW40/BPW77-style two-lead phototransistor.</text>

<rect x="80" y="400" width="330" height="260" rx="24" class="board"/>
<text x="145" y="465" style="font:bold 38px Arial; fill:white;">ESP32 D1 R32</text>
<circle cx="390" cy="520" r="12" fill="white"/>
<text x="120" y="538" style="font:bold 32px Arial; fill:white;">GPIO34</text>

<path d="M390 520 H650" class="wire-purple"/>
<circle cx="650" cy="520" r="12" fill="#6a1b9a"/>
<text x="510" y="495" class="label">Sensor node</text>

<rect x="610" y="250" width="80" height="190" rx="20" class="resistor"/>
<text x="568" y="220" class="label">1 Mohm</text>
<line x1="650" y1="250" x2="650" y2="190" class="wire-orange"/>
<text x="610" y="165" class="label">3V3</text>
<line x1="650" y1="440" x2="650" y2="520" class="lead"/>

<rect x="880" y="390" width="260" height="260" rx="30" class="component"/>
<text x="930" y="440" class="label">Phototransistor</text>
<line x1="930" y1="650" x2="930" y2="750" class="lead"/>
<line x1="1090" y1="650" x2="1090" y2="750" class="lead"/>
<text x="860" y="800" class="label">Collector (C)</text>
<text x="1040" y="800" class="label">Emitter (E)</text>

<path d="M650 520 H930 V650" class="wire-purple"/>
<path d="M1090 650 V780" class="wire-black"/>

<line x1="1090" y1="780" x2="1090" y2="820" class="ground"/>
<line x1="1052" y1="820" x2="1128" y2="820" class="ground"/>
<line x1="1064" y1="835" x2="1116" y2="835" class="ground"/>
<line x1="1076" y1="850" x2="1104" y2="850" class="ground"/>
<text x="1050" y="890" class="label">GND</text>

<rect x="70" y="880" width="1460" height="150" rx="20" class="note"/>
<text x="110" y="930" class="text">Collector -> GPIO34 sensor node. Emitter -> GND.</text>
<text x="110" y="980" class="text">Verify the exact lead order in the datasheet for your phototransistor.</text>
</svg>