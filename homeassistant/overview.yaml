type: vertical-stack
cards:
  - type: entities
    title: Boiler Monitor
    entities:
      - entity: binary_sensor.boiler_monitor_alarm
        name: Latched alarm
      - entity: text_sensor.boiler_monitor_last_alarm
        name: Last alarm
      - entity: binary_sensor.boiler_monitor_boiler_led_detected
        name: Boiler LED detected
      - entity: sensor.boiler_monitor_led_level
        name: LED level
      - entity: number.boiler_monitor_led_threshold
        name: LED threshold
      - entity: sensor.boiler_monitor_temperature
        name: Temperature
      - entity: button.boiler_monitor_acknowledge_alarm
        name: Silence buzzer
      - entity: button.boiler_monitor_reset_latched_alarm
        name: Reset latched alarm
  - type: history-graph
    title: Temperature and LED level
    hours_to_show: 24
    entities:
      - sensor.boiler_monitor_temperature
      - sensor.boiler_monitor_led_level
