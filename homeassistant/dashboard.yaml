type: vertical-stack
cards:
  - type: entities
    title: Boiler Monitor
    entities:
      - entity: binary_sensor.boiler_monitor_alarm
        name: Larmat läge
      - entity: binary_sensor.boiler_monitor_boiler_led_detected
        name: Pannans LED detekterad
      - entity: binary_sensor.boiler_monitor_buzzer_active
        name: Summer aktiv
      - entity: binary_sensor.boiler_monitor_buzzer_muted
        name: Summer tystad
      - entity: sensor.boiler_monitor_led_level
        name: LED-nivå
      - entity: number.boiler_monitor_led_threshold
        name: Tröskelvärde
      - entity: number.boiler_monitor_alarm_clear_delay
        name: Automatisk återställning
      - entity: switch.boiler_monitor_buzzer_enabled
        name: Summer aktiverad
      - entity: button.boiler_monitor_acknowledge_alarm
        name: Tysta summer
      - entity: button.boiler_monitor_reset_latched_alarm
        name: Återställ larmat läge
      - entity: button.boiler_monitor_test_buzzer
        name: Testa summer
  - type: history-graph
    title: LED-nivå
    entities:
      - sensor.boiler_monitor_led_level
    hours_to_show: 6
