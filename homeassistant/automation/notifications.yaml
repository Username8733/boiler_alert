- alias: Boiler Monitor - Alarm Notification
  id: boiler_monitor_alarm_notification
  mode: single
  trigger:
    - platform: state
      entity_id: binary_sensor.boiler_monitor_alarm
      to: "on"
  action:
    - service: notify.mobile_app_YOUR_PHONE
      data:
        title: "Boiler alarm"
        message: >
          The boiler's red alarm LED is active.
          Last alarm: {{ states('text_sensor.boiler_monitor_last_alarm') }}
    - service: persistent_notification.create
      data:
        title: "Boiler alarm"
        message: >
          Boiler Monitor detected the boiler's red alarm LED.
          Last alarm: {{ states('text_sensor.boiler_monitor_last_alarm') }}
