name: ESPHome compile

on:
  push:
    paths:
      - 'firmware/**'
      - '.github/workflows/esphome.yml'
  pull_request:
    paths:
      - 'firmware/**'

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create secrets file
        run: cp firmware/secrets.yaml.example firmware/secrets.yaml
      - name: Compile ESPHome
        uses: esphome/build-action@v7
        with:
          yaml_file: firmware/boiler-alert.yaml
          version: latest
