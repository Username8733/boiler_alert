substitutions:
  device_name: boiler-monitor-hardware-test
  friendly_name: Boiler Monitor Hardware Test

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: -100
    then:
      - output.turn_off: red_led_output
      - output.turn_off: buzzer_output
      - output.turn_on: green_led_output
      - delay: 500ms
      - output.turn_off: green_led_output
      - output.turn_on: red_led_output
      - delay: 500ms
      - output.turn_off: red_led_output
      - output.turn_on: buzzer_output
      - delay: 200ms
      - output.turn_off: buzzer_output
      - output.turn_on: green_led_output

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
api:
ota:
  platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret fallback_ap_password

captive_portal:
web_server:
  port: 80
  version: 3

output:
  - platform: gpio
    pin: GPIO18
    id: buzzer_output
  - platform: gpio
    pin: GPIO19
    id: red_led_output
  - platform: gpio
    pin: GPIO21
    id: green_led_output

script:
  - id: hardware_test
    mode: single
    then:
      - output.turn_off: green_led_output
      - output.turn_on: red_led_output
      - output.turn_on: buzzer_output
      - delay: 1s
      - output.turn_off: buzzer_output
      - delay: 2s
      - output.turn_off: red_led_output
      - output.turn_on: green_led_output

binary_sensor:
  - platform: gpio
    name: "${friendly_name} Button"
    pin:
      number: GPIO22
      mode: INPUT_PULLUP
      inverted: true
    filters:
      - delayed_on: 30ms
      - delayed_off: 30ms
    on_press:
      then:
        - script.execute: hardware_test

button:
  - platform: template
    name: "${friendly_name} Run Test"
    on_press:
      then:
        - script.execute: hardware_test
